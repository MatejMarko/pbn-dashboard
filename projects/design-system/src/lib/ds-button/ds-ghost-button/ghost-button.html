@if (purposeType() === 'action' && icon()) {
  <otp-svg [name]="icon()!" size="1rem"></otp-svg>
}
<!-- with no direction, no icon is shown; e.g. breadcrumbs -->
@if (purposeType() === 'navigation' && direction() && direction() === 'left') {
  <otp-svg [name]="directionIcon()!" size="1rem"></otp-svg>
}
<span class="body-md-semibold-fixed">
  <ng-content></ng-content>
</span>
<!-- with no direction, no icon is shown; e.g. breadcrumbs -->
@if (purposeType() === 'navigation' && direction() && direction() !== 'left') {
  <otp-svg [name]="directionIcon()!" size="1rem"></otp-svg>
}
